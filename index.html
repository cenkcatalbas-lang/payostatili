<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paros Defteri</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --whitewash:#EDE9DE; --paper:#F7F4EC; --ink:#1B2A4A; --aegean:#2C6E9E;
    --terracotta:#BF5730; --gold:#C89B3C; --line:#D8D2C2; --muted:#6B6555; --faint:#A8A296;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--whitewash);color:var(--ink);font-family:'Work Sans',sans-serif;}
  .serif{font-family:'Instrument Serif',serif;font-style:italic;}
  .mono{font-family:'Space Grotesk',sans-serif;}
  .wrap{max-width:480px;margin:0 auto;padding-bottom:96px;}
  button{font-family:inherit;}
  a{color:inherit;}

  /* ---------- Login ---------- */
  #loginScreen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px;}
  .login-kicker{display:flex;align-items:center;gap:8px;color:var(--aegean);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;margin-bottom:8px;justify-content:center;}
  .login-title{font-size:32px;text-align:center;margin:0 0 32px;font-weight:400;}
  .avatar-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:360px;margin:0 auto;}
  .avatar-card{background:var(--paper);border:1px solid var(--line);padding:20px 12px;text-align:center;cursor:pointer;transition:transform .15s, border-color .15s;}
  .avatar-card:hover{transform:translateY(-2px);border-color:var(--aegean);}
  .avatar-card img{width:64px;height:64px;border-radius:50%;background:var(--whitewash);margin-bottom:10px;transition:transform .2s;}
  .avatar-card:hover img{transform:scale(1.15);}
  .avatar-card .name{font-size:13px;font-weight:500;}
  .avatar-card .couple-tag{font-size:10px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
  #pinOverlay{position:fixed;inset:0;background:rgba(27,42,74,.5);display:none;align-items:center;justify-content:center;z-index:20;}
  #pinOverlay.open{display:flex;}
  .pin-sheet{background:var(--whitewash);border:1px solid var(--line);padding:28px 24px;width:300px;text-align:center;}
  .pin-sheet img{width:72px;height:72px;border-radius:50%;margin-bottom:12px;}
  .pin-sheet .pname{font-size:20px;margin-bottom:16px;}
  .pin-sheet input{width:100%;text-align:center;font-size:22px;letter-spacing:.4em;padding:10px;border:1px solid var(--line);background:var(--paper);font-family:'Space Grotesk',sans-serif;margin-bottom:12px;}
  .pin-sheet input:focus{outline:none;border-color:var(--aegean);}
  .pin-err{color:var(--terracotta);font-size:12px;min-height:16px;margin-bottom:8px;}
  .pin-buttons{display:flex;gap:8px;}
  .pin-buttons button{flex:1;padding:10px;border:none;font-size:13px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;}
  .pin-cancel{background:var(--paper);border:1px solid var(--line) !important;color:var(--muted);}
  .pin-confirm{background:var(--ink);color:var(--whitewash);}
  .pin-confirm:hover{background:var(--aegean);}

  /* ---------- App shell ---------- */
  #appScreen{display:none;}
  header.topbar{padding:24px 24px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .who{display:flex;align-items:center;gap:10px;}
  .who img{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:transform .2s;}
  .who img:hover{transform:scale(1.5);}
  .who-name{font-size:14px;font-weight:500;}
  .logout-btn{background:none;border:none;color:var(--faint);font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
  .logout-btn:hover{color:var(--terracotta);}
  h1.trip-title{font-size:26px;margin:16px 24px 4px;font-weight:400;}

  .hero-banner .trip-title{margin:0;color:#F7F4EC;font-size:28px;}
  .hero-banner .hero-kicker{display:flex;align-items:center;gap:8px;color:#E8D9A8;font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:500;margin-bottom:8px;}
  .tabs{display:flex;border-bottom:1px solid var(--line);margin:0 24px;}
  .tab{flex:1;padding:12px 0;text-align:center;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
  .tab.active{color:var(--ink);border-bottom-color:var(--aegean);font-weight:500;}
  .panel{display:none;}
  .panel.active{display:block;}

  /* ---------- Expenses ---------- */
  .balances{padding:24px;border-bottom:1px solid var(--line);}
  .bal-block{margin-bottom:16px;}
  .bal-block:last-child{margin-bottom:0;}
  .bal-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .bal-head .label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  .bal-head .amt{font-size:20px;font-weight:600;}
  .grand-total{text-align:center;padding-bottom:20px;margin-bottom:20px;border-bottom:1px dashed var(--line);}
  .grand-total .gt-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .grand-total .gt-amounts{display:flex;justify-content:center;align-items:baseline;gap:10px;}
  .grand-total .gt-amt{font-size:26px;font-weight:600;}
  .grand-total .gt-sep{color:var(--faint);font-size:16px;}
  .couple-totals{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .couple-total-block{background:var(--paper);border:1px solid var(--line);padding:14px 12px;text-align:center;}
  .couple-total-block .ct-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .couple-total-block .ct-amt{font-size:16px;font-weight:600;display:block;}
  .couple-total-block .ct-amt + .ct-amt{margin-top:2px;}
  .empty-note{font-size:12px;color:var(--faint);}
  .settled-note{font-size:14px;color:var(--muted);}
  .couple-sub{font-size:11px;color:var(--faint);margin-top:6px;}

  .list{padding:24px;}
  .list-head{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:16px;}
  .empty-state{font-size:14px;color:var(--faint);padding:32px 0;text-align:center;border:1px dashed var(--line);}
  .stub{background:var(--paper);border:1px solid var(--line);margin-bottom:12px;position:relative;}
  .stub-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px 8px;gap:10px;}
  .stub-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;}
  .stub-desc{font-size:14px;font-weight:500;}
  .stub-meta{font-size:11px;color:var(--faint);margin-top:2px;}
  .stub-del{background:none;border:none;color:var(--faint);cursor:pointer;padding:4px;opacity:0;transition:opacity .15s;}
  .stub:hover .stub-del{opacity:1;}
  .stub-del:hover{color:var(--terracotta);}
  .stub-bottom{border-top:1px dashed var(--line);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;}
  .stub-amt{font-size:16px;font-weight:600;}
  .fab{position:fixed;bottom:24px;left:24px;right:24px;max-width:432px;margin:0 auto;background:var(--ink);color:var(--whitewash);border:none;padding:14px;font-size:14px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .fab:hover{background:var(--aegean);}

  /* ---------- Itinerary ---------- */
  .day-card{background:var(--paper);border:1px solid var(--line);margin:0 24px 16px;padding:16px;}
  .day-head{display:flex;gap:10px;margin-bottom:10px;}
  .day-head input{font-family:'Space Grotesk',sans-serif;font-size:13px;border:1px solid var(--line);background:var(--whitewash);padding:8px 10px;}
  .day-head input.day-title{flex:1;font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;}
  .day-head input.day-date{width:110px;}
  .day-notes{width:100%;min-height:80px;border:1px solid var(--line);background:var(--whitewash);padding:10px;font-family:inherit;font-size:13px;resize:vertical;}
  .day-notes:focus, .day-head input:focus{outline:none;border-color:var(--aegean);}
  .day-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  .save-hint{font-size:10px;color:var(--faint);}
  .del-day{background:none;border:none;color:var(--faint);font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;}
  .del-day:hover{color:var(--terracotta);}
  .add-day-btn{margin:0 24px 24px;width:calc(100% - 48px);background:var(--paper);border:1px dashed var(--line);color:var(--muted);padding:12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;}
  .add-day-btn:hover{border-color:var(--aegean);color:var(--aegean);}

  /* ---------- Expense form overlay ---------- */
  .overlay{position:fixed;inset:0;background:rgba(27,42,74,.4);display:none;align-items:center;justify-content:center;z-index:10;}
  .overlay.open{display:flex;}
  .sheet{background:var(--whitewash);width:100%;max-width:432px;max-height:85vh;overflow-y:auto;padding:24px;border:1px solid var(--line);margin:16px;}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .sheet-head h2{margin:0;font-size:24px;font-weight:400;}
  .sheet-head button{background:none;border:none;color:var(--faint);cursor:pointer;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;background:var(--paper);border:1px solid var(--line);padding:10px 12px;font-size:14px;font-family:inherit;}
  .field input:focus{outline:none;border-color:var(--aegean);}
  .row{display:flex;gap:12px;}
  .row .field{flex:1;}
  .row .field.narrow{flex:0 0 112px;}
  .btn-group{display:flex;gap:8px;}
  .opt{flex:1;padding:10px;font-size:13px;border:1px solid var(--line);background:var(--paper);color:var(--muted);cursor:pointer;font-family:inherit;}
  .opt.active-cur{background:var(--ink);color:var(--whitewash);border-color:var(--ink);}
  .note{font-size:11px;color:var(--faint);margin-bottom:16px;}
  .save-btn{width:100%;background:var(--ink);color:var(--whitewash);border:none;padding:12px;font-size:14px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;cursor:pointer;}
  .save-btn:hover{background:var(--aegean);}

  /* ---------- Lightbox ---------- */
  #lightbox{position:fixed;inset:0;background:rgba(27,42,74,.75);display:none;align-items:center;justify-content:center;z-index:30;flex-direction:column;gap:16px;cursor:zoom-out;}
  #lightbox.open{display:flex;}
  #lightbox img{width:220px;height:220px;border-radius:50%;background:var(--whitewash);}
  #lightbox .lb-name{color:var(--whitewash);font-size:22px;font-family:'Instrument Serif',serif;font-style:italic;}

  .toast{position:fixed;bottom:96px;left:24px;right:24px;max-width:432px;margin:0 auto;background:var(--terracotta);color:var(--paper);font-size:14px;padding:10px 16px;display:none;justify-content:space-between;align-items:center;z-index:15;}
  .toast.open{display:flex;}
  .toast button{background:none;border:none;color:inherit;cursor:pointer;}
  svg.icon{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.75;vertical-align:-2px;}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-kicker">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M5 12h14M7 6l5-4 5 4M7 18l5 4 5-4"/></svg>
    Paros Adası
  </div>
  <h1 class="login-title serif">Kimsin?</h1>
  <div class="avatar-grid" id="avatarGrid"></div>
</div>

<div id="pinOverlay">
  <div class="pin-sheet">
    <img id="pinAvatarImg" src="" alt="" />
    <div class="pname serif" id="pinName"></div>
    <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="••••" />
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-buttons">
      <button class="pin-cancel" onclick="closePinOverlay()">Vazgeç</button>
      <button class="pin-confirm" onclick="submitPin()">Giriş</button>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appScreen">
  <header class="topbar">
    <div class="who">
      <img id="currentAvatarImg" src="" alt="" onclick="openLightboxCurrent()" />
      <span class="who-name" id="currentName"></span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="logout-btn" id="avatarEditBtn" style="display:none;" onclick="openAvatarEdit()">Avatarları düzenle</button>
      <button class="logout-btn" onclick="logout()">Çıkış</button>
    </div>
  </header>

  <div class="wrap">
    <div class="hero-banner">
      <div class="hero-kicker">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M5 12h14M7 6l5-4 5 4M7 18l5 4 5-4"/></svg>
        Paros Adası
      </div>
      <h1 class="trip-title serif">Paros — Tatil Defteri</h1>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabExpBtn" onclick="switchTab('expenses')">Harcamalar</button>
      <button class="tab" id="tabItinBtn" onclick="switchTab('itinerary')">Program</button>
    </div>

    <!-- Expenses panel -->
    <div class="panel active" id="panelExpenses">
      <div class="balances" id="balances"></div>
      <div class="list">
        <div class="list-head">
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 3h16v18l-3-2-3 2-3-2-3 2-3-2-1 2V3z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
          <span id="listCount">Harcamalar (0)</span>
        </div>
        <div id="expenseList"></div>
      </div>
    </div>

    <!-- Itinerary panel -->
    <div class="panel" id="panelItinerary">
      <div id="dayList" style="padding-top:20px;"></div>
      <button class="add-day-btn" onclick="addDay()">+ Gün ekle</button>
    </div>
  </div>

  <button class="fab" id="fabAdd" onclick="openForm()">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    Harcama ekle
  </button>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button onclick="closeToast()">✕</button>
</div>

<!-- Expense form -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeForm()">
  <div class="sheet">
    <div class="sheet-head">
      <h2 class="serif">Yeni harcama</h2>
      <button onclick="closeForm()">✕</button>
    </div>
    <div class="field">
      <label>Ne için</label>
      <input id="fDesc" placeholder="Örn. Naoussa'da akşam yemeği" />
    </div>
    <div class="row">
      <div class="field">
        <label>Tutar</label>
        <input id="fAmount" class="mono" inputmode="decimal" placeholder="0.00" />
      </div>
      <div class="field narrow">
        <label>Para birimi</label>
        <div class="btn-group" id="currencyGroup"></div>
      </div>
    </div>
    <div class="note serif" id="paidByNote"></div>
    <button class="save-btn" onclick="addExpense()">Kaydet</button>
  </div>
</div>

<!-- Avatar edit (Cenk only) -->
<div class="overlay" id="avatarOverlay" onclick="if(event.target===this)closeAvatarEdit()">
  <div class="sheet">
    <div class="sheet-head">
      <h2 class="serif">Avatarları düzenle</h2>
      <button onclick="closeAvatarEdit()">✕</button>
    </div>
    <div class="note serif">Görsel linki (URL) yapıştır. Boş bırakırsan otomatik avatar kullanılır.</div>
    <div id="avatarEditFields"></div>
    <button class="save-btn" onclick="saveAvatars()">Kaydet</button>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="" />
  <div class="lb-name serif" id="lightboxName"></div>
</div>

<script>
// ====== FIREBASE AYARLARI — kendi Firebase projenin bilgilerini buraya yapıştır ======
const firebaseConfig = {
  apiKey: "AIzaSyC8whJxKHDhKHnCd8BUy6wQDLbrHuJkrto",
  authDomain: "paros-defteri.firebaseapp.com",
  projectId: "paros-defteri",
  storageBucket: "paros-defteri.firebasestorage.app",
  messagingSenderId: "106607602796",
  appId: "1:106607602796:web:67bbc8c78ae4893200bc49"
};
// Kurulum adımları için README.md dosyasına bak.
// ====================================================================================

const PEOPLE = ['Cenk', 'Sema', 'Diana', 'Selim'];
const COUPLES = { A: ['Cenk', 'Sema'], B: ['Diana', 'Selim'] };
const PINS = { Cenk:'2121', Selim:'4646', Diana:'6688', Sema:'4747' };
const CURRENCIES = [{id:'EUR',symbol:'€',label:'Euro'},{id:'TRY',symbol:'₺',label:'TL'}];
const AVATAR_BG = { Cenk:'2c6e9e', Sema:'bf5730', Diana:'c89b3c', Selim:'1b2a4a' };

function avatarUrl(name){
  if (avatarOverrides[name]) return avatarOverrides[name];
  return `https://api.dicebear.com/9.x/adventurer/svg?seed=${encodeURIComponent(name)}&backgroundColor=${AVATAR_BG[name]}&backgroundType=solid`;
}
function canEditAvatars(){
  return currentUser === 'Cenk';
}
function coupleOf(person){
  return COUPLES.A.includes(person) ? 'A' : 'B';
}
function coupleLabel(key){
  return COUPLES[key].join(' & ');
}

let db = null;
let expDocRef = null;
let itinDocRef = null;
let avatarDocRef = null;
let expenses = [];
let days = [];
let avatarOverrides = {};
let currentUser = sessionStorage.getItem('paros-current-user') || null;
let pendingLoginPerson = null;
let activeTab = 'expenses';
let form = { desc:'', amount:'', currency:'EUR' };

function showToast(msg){
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toast').classList.add('open');
}
function closeToast(){ document.getElementById('toast').classList.remove('open'); }

function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    expDocRef = db.collection('paros-trip').doc('expenses');
    itinDocRef = db.collection('paros-trip').doc('itinerary');
    avatarDocRef = db.collection('paros-trip').doc('avatars');

    avatarDocRef.onSnapshot((doc)=>{
      avatarOverrides = (doc.exists && doc.data()) ? doc.data() : {};
      renderLogin();
      if (currentUser){
        document.getElementById('currentAvatarImg').src = avatarUrl(currentUser);
        renderExpenseList();
      }
    }, (err)=>{ console.error(err); });

    expDocRef.onSnapshot((doc)=>{
      expenses = (doc.exists && doc.data().items) ? doc.data().items : [];
      renderExpensePanel();
    }, (err)=>{ console.error(err); showToast('Bağlantı hatası — Firebase ayarlarını kontrol et.'); });

    itinDocRef.onSnapshot((doc)=>{
      days = (doc.exists && doc.data().days) ? doc.data().days : defaultDays();
      renderItinerary();
    }, (err)=>{ console.error(err); showToast('Bağlantı hatası — Firebase ayarlarını kontrol et.'); });
  }catch(e){
    console.error(e);
    showToast('Firebase ayarları eksik — README.md dosyasına bak.');
  }
}

function defaultDays(){
  return [
    { id: uid(), title: 'Gün 1', date: '', notes: '' },
    { id: uid(), title: 'Gün 2', date: '', notes: '' },
    { id: uid(), title: 'Gün 3', date: '', notes: '' },
  ];
}

function uid(){ return Math.random().toString(36).slice(2,10); }
function fmt(n, currency){
  const c = CURRENCIES.find(c=>c.id===currency);
  return c.symbol + n.toFixed(2);
}

// ---------- Login ----------
function renderLogin(){
  const grid = document.getElementById('avatarGrid');
  grid.innerHTML = PEOPLE.map(p => `
    <div class="avatar-card" onclick="openPinOverlay('${p}')">
      <img src="${avatarUrl(p)}" alt="${p}" />
      <div class="name">${p}</div>
      <div class="couple-tag">${coupleOf(p)==='A' ? 'Çift · Cenk & Sema' : 'Çift · Diana & Selim'}</div>
    </div>
  `).join('');
}

function openPinOverlay(person){
  pendingLoginPerson = person;
  document.getElementById('pinAvatarImg').src = avatarUrl(person);
  document.getElementById('pinName').textContent = person;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinErr').textContent = '';
  document.getElementById('pinOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('pinInput').focus(), 50);
}
function closePinOverlay(){
  document.getElementById('pinOverlay').classList.remove('open');
  pendingLoginPerson = null;
}
function submitPin(){
  const val = document.getElementById('pinInput').value;
  if (val === PINS[pendingLoginPerson]){
    sessionStorage.setItem('paros-current-user', pendingLoginPerson);
    currentUser = pendingLoginPerson;
    closePinOverlay();
    enterApp();
  } else {
    document.getElementById('pinErr').textContent = 'Şifre yanlış, tekrar dene.';
  }
}
document.addEventListener('keydown', (e)=>{
  if (e.key === 'Enter' && document.getElementById('pinOverlay').classList.contains('open')) submitPin();
});

function logout(){
  sessionStorage.removeItem('paros-current-user');
  currentUser = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function enterApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('currentAvatarImg').src = avatarUrl(currentUser);
  document.getElementById('currentName').textContent = currentUser;
  document.getElementById('avatarEditBtn').style.display = canEditAvatars() ? 'inline-block' : 'none';
  renderExpensePanel();
  renderItinerary();
}

// ---------- Tabs ----------
function switchTab(tab){
  activeTab = tab;
  document.getElementById('tabExpBtn').classList.toggle('active', tab==='expenses');
  document.getElementById('tabItinBtn').classList.toggle('active', tab==='itinerary');
  document.getElementById('panelExpenses').classList.toggle('active', tab==='expenses');
  document.getElementById('panelItinerary').classList.toggle('active', tab==='itinerary');
  document.getElementById('fabAdd').style.display = tab==='expenses' ? 'flex' : 'none';
}

// ---------- Expenses ----------
function computeBalances(){
  const out = {};
  CURRENCIES.forEach(c => out[c.id] = { A:0, B:0 });
  expenses.forEach(e=>{
    const k = coupleOf(e.person);
    out[e.currency][k] += e.amount;
  });
  return out;
}
function computeTotals(){
  const out = { EUR:0, TRY:0 };
  expenses.forEach(e => out[e.currency] += e.amount);
  return out;
}

function renderBalances(){
  const balances = computeBalances();
  const totals = computeTotals();
  const el = document.getElementById('balances');

  const gt = `
    <div class="grand-total">
      <div class="gt-label">Toplam Ortak Harcama</div>
      <div class="gt-amounts">
        <span class="gt-amt mono">${fmt(totals.EUR,'EUR')}</span>
        <span class="gt-sep">·</span>
        <span class="gt-amt mono">${fmt(totals.TRY,'TRY')}</span>
      </div>
    </div>
  `;

  const couples = `
    <div class="couple-totals">
      <div class="couple-total-block">
        <div class="ct-label">Cenk – Sema</div>
        <span class="ct-amt mono">${fmt(balances.EUR.A,'EUR')}</span>
        <span class="ct-amt mono">${fmt(balances.TRY.A,'TRY')}</span>
      </div>
      <div class="couple-total-block">
        <div class="ct-label">Selim – Diana</div>
        <span class="ct-amt mono">${fmt(balances.EUR.B,'EUR')}</span>
        <span class="ct-amt mono">${fmt(balances.TRY.B,'TRY')}</span>
      </div>
    </div>
  `;

  el.innerHTML = gt + couples;
}

function renderExpenseList(){
  document.getElementById('listCount').textContent = `Harcamalar (${expenses.length})`;
  const el = document.getElementById('expenseList');
  if (expenses.length === 0){
    el.innerHTML = '<div class="empty-state">Henüz kayıt yok. Aşağıdan ilk harcamayı ekle.</div>';
    return;
  }
  const sorted = [...expenses].sort((a,b)=>b.ts-a.ts);
  el.innerHTML = sorted.map(e => `
    <div class="stub">
      <div class="stub-top">
        <img class="stub-avatar" src="${avatarUrl(e.person)}" alt="${e.person}" />
        <div style="flex:1;">
          <div class="stub-desc">${escapeHtml(e.desc)}</div>
          <div class="stub-meta">${e.person} · ${coupleOf(e.person)==='A' ? 'Cenk & Sema' : 'Diana & Selim'}</div>
        </div>
        ${e.person === currentUser ? `<button class="stub-del" onclick="deleteExpense('${e.id}')">
          <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>` : ''}
      </div>
      <div class="stub-bottom">
        <span></span>
        <span class="stub-amt mono">${fmt(e.amount, e.currency)}</span>
      </div>
    </div>
  `).join('');
}

function renderExpensePanel(){
  renderBalances();
  renderExpenseList();
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function deleteExpense(id){
  const next = expenses.filter(e => e.id !== id);
  expDocRef.set({ items: next }, { merge:true }).catch((e)=>{ console.error(e); showToast('Silinemedi, tekrar dene.'); });
}

function openForm(){
  form = { desc:'', amount:'', currency:'EUR' };
  document.getElementById('fDesc').value = '';
  document.getElementById('fAmount').value = '';
  document.getElementById('paidByNote').textContent = `${currentUser} olarak ekleniyor.`;
  renderCurrencyOptions();
  document.getElementById('overlay').classList.add('open');
}
function closeForm(){ document.getElementById('overlay').classList.remove('open'); }

function renderCurrencyOptions(){
  const curEl = document.getElementById('currencyGroup');
  curEl.innerHTML = CURRENCIES.map(c => `<button class="opt ${form.currency===c.id?'active-cur':''}" onclick="setCurrency('${c.id}')">${c.symbol}</button>`).join('');
}
function setCurrency(id){ form.currency = id; renderCurrencyOptions(); }

function addExpense(){
  const desc = document.getElementById('fDesc').value.trim();
  const amtRaw = document.getElementById('fAmount').value.replace(',', '.');
  const amt = parseFloat(amtRaw);
  if (!desc || !amt || amt <= 0){
    showToast('Açıklama ve tutar gerekli.');
    return;
  }
  const exp = { id:uid(), desc, amount:amt, currency:form.currency, person:currentUser, ts:Date.now() };
  const next = [exp, ...expenses];
  expDocRef.set({ items: next }, { merge:true }).catch((e)=>{ console.error(e); showToast('Kaydedilemedi, tekrar dene.'); });
  closeForm();
}

// ---------- Itinerary ----------
function renderItinerary(){
  const el = document.getElementById('dayList');
  if (!days || days.length === 0){ days = defaultDays(); }
  el.innerHTML = days.map((d, idx) => `
    <div class="day-card">
      <div class="day-head">
        <input class="day-title" value="${escapeAttr(d.title)}" onchange="updateDay('${d.id}','title',this.value)" placeholder="Gün başlığı" />
        <input class="day-date" value="${escapeAttr(d.date)}" onchange="updateDay('${d.id}','date',this.value)" placeholder="Tarih" />
      </div>
      <textarea class="day-notes" onchange="updateDay('${d.id}','notes',this.value)" placeholder="Plan, adres, saat...">${escapeHtml(d.notes)}</textarea>
      <div class="day-foot">
        <span class="save-hint">Değişiklik otomatik kaydedilir</span>
        <button class="del-day" onclick="deleteDay('${d.id}')">Günü sil</button>
      </div>
    </div>
  `).join('');
}
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }

function updateDay(id, field, value){
  const next = days.map(d => d.id === id ? { ...d, [field]: value } : d);
  days = next;
  itinDocRef.set({ days: next }, { merge:true }).catch((e)=>{ console.error(e); showToast('Kaydedilemedi, tekrar dene.'); });
}
function addDay(){
  const next = [...days, { id:uid(), title:`Gün ${days.length+1}`, date:'', notes:'' }];
  days = next;
  itinDocRef.set({ days: next }, { merge:true }).catch((e)=>{ console.error(e); showToast('Kaydedilemedi, tekrar dene.'); });
  renderItinerary();
}
function deleteDay(id){
  const next = days.filter(d => d.id !== id);
  days = next;
  itinDocRef.set({ days: next }, { merge:true }).catch((e)=>{ console.error(e); showToast('Silinemedi, tekrar dene.'); });
  renderItinerary();
}

// ---------- Avatar editing (Cenk only) ----------
function openAvatarEdit(){
  if (!canEditAvatars()){ showToast('Bu yetki sadece Cenk\'te.'); return; }
  const el = document.getElementById('avatarEditFields');
  el.innerHTML = PEOPLE.map(p => `
    <div class="field">
      <label>${p}</label>
      <input id="avatarInput_${p}" placeholder="https://..." value="${escapeAttr(avatarOverrides[p] || '')}" />
    </div>
  `).join('');
  document.getElementById('avatarOverlay').classList.add('open');
}
function closeAvatarEdit(){ document.getElementById('avatarOverlay').classList.remove('open'); }
function saveAvatars(){
  if (!canEditAvatars()){ showToast('Bu yetki sadece Cenk\'te.'); return; }
  const next = {};
  PEOPLE.forEach(p => {
    const val = document.getElementById(`avatarInput_${p}`).value.trim();
    if (val) next[p] = val;
  });
  avatarDocRef.set(next).catch((e)=>{ console.error(e); showToast('Kaydedilemedi, tekrar dene.'); });
  closeAvatarEdit();
}

// ---------- Lightbox ----------
function openLightboxCurrent(){ openLightbox(currentUser); }
function openLightbox(person){
  document.getElementById('lightboxImg').src = avatarUrl(person);
  document.getElementById('lightboxName').textContent = person;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

// ---------- Boot ----------
renderLogin();
initFirebase();
if (currentUser){ enterApp(); }
</script>
</body>
</html>
